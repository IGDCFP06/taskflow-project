<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taskflow</title>

<style>
:root{
  --bg:#0b0b12;
  --bg2:#150b2d;
  --card:rgba(20,20,37,.92);
  --line:rgba(255,255,255,.10);
  --text:#f2f2ff;
  --muted:#b8b8d0;
  --accent:#7c4dff;
  --accent2:#00e5ff;
  --danger:#ff3b6b;
  --ok:#30e38a;
  --r:16px;
}
*{box-sizing:border-box}
body{
  margin:0; font-family:Arial, sans-serif; color:var(--text);
  min-height:100vh; display:grid; place-items:center;
  background:
    radial-gradient(900px 380px at 18% 0%, rgba(124,77,255,.22), transparent 60%),
    radial-gradient(900px 380px at 85% 10%, rgba(0,229,255,.12), transparent 60%),
    linear-gradient(160deg, var(--bg), var(--bg2));
  padding:18px;
}
main{
  width:min(760px,100%);
  background: var(--card);
  border:1px solid rgba(255,255,255,.08);
  border-radius: var(--r);
  box-shadow: 0 16px 45px rgba(0,0,0,.45);
  padding:18px;
  position:relative;
  overflow:hidden;
}
main::before{
  content:"";
  position:absolute; inset:-2px;
  background: radial-gradient(520px 220px at 20% 0%, rgba(124,77,255,.18), transparent 60%);
  pointer-events:none;
}
header{
  display:flex; justify-content:space-between; align-items:center;
  gap:12px; margin-bottom:14px;
}
.brand{
  display:flex; gap:12px; align-items:center;
}
.logo{
  width:42px; height:42px; border-radius:14px;
  display:grid; place-items:center; font-weight:900;
  background: linear-gradient(135deg, rgba(124,77,255,.95), rgba(0,229,255,.55));
  box-shadow: 0 12px 25px rgba(124,77,255,.20);
}
h1{margin:0; font-size:20px}
p{margin:4px 0 0; color:var(--muted); font-size:13px}

.pills{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end}
.pill{
  font-size:12px; color:var(--muted);
  padding:8px 10px; border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.20);
}
.pill strong{color:var(--text)}

.row{display:flex; gap:10px; margin-top:12px}
input, select{
  width:100%;
  padding:12px; border-radius:12px;
  border:1px solid var(--line);
  background:#0f0f18; color:var(--text); outline:none;
}
input::placeholder{color:rgba(255,255,255,.45)}
input:focus, select:focus{
  border-color: rgba(124,77,255,.6);
  box-shadow:0 0 0 4px rgba(124,77,255,.15)
}
button{
  padding:12px 14px; border-radius:12px; cursor:pointer;
  border:1px solid rgba(255,255,255,.10);
  background: linear-gradient(135deg, rgba(124,77,255,.95), rgba(124,77,255,.55));
  color:var(--text); font-weight:700;
  transition: filter .15s ease, transform .15s ease;
}
button:hover{filter:brightness(1.06); transform:translateY(-1px)}
button:active{transform:translateY(0)}
.smallBtn{background:rgba(255,255,255,.06)}

ul{
  list-style:none; padding:0; margin:14px 0 0;
  display:flex; flex-direction:column; gap:10px
}
li{
  display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:12px; border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background: rgba(0,0,0,.22);
  transition: transform .15s ease, border-color .15s ease, opacity .15s ease;
}
li:hover{transform:translateY(-1px); border-color: rgba(124,77,255,.35)}
.left{
  display:flex; align-items:center; gap:10px; min-width:0;
}
.check{
  width:18px; height:18px; accent-color: var(--ok); cursor:pointer;
}
.taskText{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.badge{
  font-size:11px; padding:5px 8px; border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background: rgba(255,255,255,.06);
  color:var(--muted);
  flex-shrink:0;
}
.badge.low{border-color: rgba(0,229,255,.25)}
.badge.med{border-color: rgba(124,77,255,.35)}
.badge.high{border-color: rgba(255,59,107,.35)}

.done .taskText{ text-decoration: line-through; opacity:.7 }
.del{
  background:rgba(255,59,107,.12);
  border-color:rgba(255,59,107,.35);
}
.empty{
  margin-top:14px;
  color:var(--muted);
  text-align:center;
  border:1px dashed rgba(255,255,255,.12);
  border-radius:14px;
  padding:14px;
  display:none;
}

/* mini anim */
.pop{ animation: pop .16s ease; }
@keyframes pop{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)} }
.out{ opacity:0; transform:translateY(6px); }
</style>
</head>

<body>
<main>
  <header>
    <div class="brand">
      <div class="logo">TF</div>
      <div>
        <h1>Taskflow</h1>
      </div>
    </div>
    <div class="pills">
      <div class="pill">Total: <strong id="totalCount">0</strong></div>
      <div class="pill">Hechas: <strong id="doneCount">0</strong></div>
    </div>
  </header>

  <form id="taskForm" class="row">
    <input id="taskInput" type="text" placeholder="Nueva tarea..." autocomplete="off" />
    <select id="prioSelect" title="Prioridad">
      <option value="low">Baja</option>
      <option value="med" selected>Media</option>
      <option value="high">Alta</option>
    </select>
    <button type="submit">Añadir</button>
  </form>

  <div class="row">
    <input id="searchInput" type="text" placeholder="Buscar..." />
    <button id="clearBtn" class="smallBtn" type="button">Limpiar</button>
  </div>

  <ul id="taskList"></ul>
  <div id="emptyState" class="empty">No hay tareas.</div>
</main>

<script>
/* ===== DOM ===== */
const form = document.querySelector("#taskForm");
const input = document.querySelector("#taskInput");
const prio = document.querySelector("#prioSelect");
const search = document.querySelector("#searchInput");
const clearBtn = document.querySelector("#clearBtn");
const list = document.querySelector("#taskList");
const emptyState = document.querySelector("#emptyState");
const totalCount = document.querySelector("#totalCount");
const doneCount = document.querySelector("#doneCount");

/* ===== Estado + Storage ===== */
const KEY = "taskflow_tasks";
let tasks = loadTasks(); // {id, text, prio, done}

/* ===== Storage ===== */
function saveTasks(){
  localStorage.setItem(KEY, JSON.stringify(tasks));
}
function loadTasks(){
  return JSON.parse(localStorage.getItem(KEY) || "[]");
}

/* ===== Helpers ===== */
function updateCounters(){
  totalCount.textContent = tasks.length;
  doneCount.textContent = tasks.filter(t => t.done).length;
}
function badgeLabel(p){
  return p === "low" ? "Baja" : p === "med" ? "Media" : "Alta";
}
function applyFilter(arr){
  const q = search.value.trim().toLowerCase();
  if(!q) return arr;
  return arr.filter(t => t.text.toLowerCase().includes(q));
}

/* ===== CRUD ===== */
function addTask(text, p){
  const t = text.trim();
  if(!t) return;

  tasks.push({ id: Date.now().toString(), text: t, prio: p, done:false });
  saveTasks();
  input.value = "";
  input.focus();
  render();
}
function deleteTask(id){
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}
function toggleDone(id, value){
  const task = tasks.find(t => t.id === id);
  if(!task) return;
  task.done = value;
  saveTasks();
  render();
}

/* ===== DOM ===== */
function createTaskLi(task){
  const li = document.createElement("li");
  li.className = "pop" + (task.done ? " done" : "");

  const left = document.createElement("div");
  left.className = "left";

  const chk = document.createElement("input");
  chk.type = "checkbox";
  chk.className = "check";
  chk.checked = task.done;
  chk.addEventListener("change", () => toggleDone(task.id, chk.checked));

  const span = document.createElement("span");
  span.className = "taskText";
  span.textContent = task.text;

  const badge = document.createElement("span");
  badge.className = "badge " + task.prio;
  badge.textContent = badgeLabel(task.prio);

  left.append(chk, span, badge);

  const del = document.createElement("button");
  del.type = "button";
  del.className = "del";
  del.textContent = "Eliminar";
  del.addEventListener("click", () => {
    li.classList.add("out");
    setTimeout(() => deleteTask(task.id), 150);
  });

  li.append(left, del);
  return li;
}

/* ===== Render ===== */
function render(){
  list.innerHTML = "";
  applyFilter(tasks).forEach(task => list.appendChild(createTaskLi(task)));

  emptyState.style.display = tasks.length === 0 ? "block" : "none";
  updateCounters();
}

/* ===== Eventos ===== */
form.addEventListener("submit", (e) => {
  e.preventDefault();
  addTask(input.value, prio.value);
});
search.addEventListener("input", render);
clearBtn.addEventListener("click", () => {
  search.value = "";
  render();
  input.focus();
});

/* ===== Init ===== */
render();
</script>
</body>
</html>
